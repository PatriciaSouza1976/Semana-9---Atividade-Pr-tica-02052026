<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Degustar Vinhos</title>

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- CABEÇALHO COM LOGO -->
  <div class="header">
    <div class="spacer"></div>

    <h1 class="logo-title">Degustar Vinhos</h1>

    <img src="logo.png" alt="Logo Degustar Vinhos" class="logo">
</div>

    
    <!-- FILTRO -->
    <p>Buscar:</p>
    <input type="text" id="search">

    <p>Categoria:</p>
    <select id="category">
        <option value="todas">Todas</option>
    </select>

    <br><br>
    <button id="btnRender">Mostrar Vinhos</button>

    <hr>

    <!-- PRODUTOS -->
    <h2>Produtos</h2>
    <div id="product-list"></div>

    <hr>

    <!-- DETALHES -->
    <h2>Detalhes do Vinho</h2>
    <div id="product-details"></div>

    <!-- JS -->
    <script src="script.js"></script>

</body>
</html>
